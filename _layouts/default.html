<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.7;
      color: #1a1a2e;
      background: #fafafa;
    }

    header {
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header a { color: #e0e0e0; text-decoration: none; }
    header .site-title { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
    header .site-title:hover { color: #fff; }
    header nav a { margin-left: 1.5rem; font-size: 0.95rem; }
    header nav a:hover { color: #fff; }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    @media (min-width: 1200px) {
      .container { max-width: 1100px; }
    }

    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #1a1a2e; letter-spacing: -0.02em; }
    h2 { font-size: 1.5rem; margin-top: 2rem; margin-bottom: 0.75rem; color: #1a1a2e; }
    h3 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }

    p { margin-bottom: 1rem; }
    a { color: #2563eb; }

    ul, ol { margin-bottom: 1rem; padding-left: 1.5rem; }
    li { margin-bottom: 0.3rem; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
    }
    th, td {
      text-align: left;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #e0e0e0;
    }
    th { background: #f0f0f5; font-weight: 600; }

    pre {
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 1.2rem 1.5rem;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.88em;
    }

    p code, li code {
      background: #eef;
      padding: 0.15em 0.4em;
      border-radius: 3px;
    }

    blockquote {
      border-left: 3px solid #2563eb;
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      color: #444;
      background: #f5f5ff;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 2rem 0;
    }

    .post-meta {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .post-list { list-style: none; padding: 0; }
    .post-list li {
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #eee;
    }
    .post-list li:last-child { border-bottom: none; }
    .post-list h3 { margin-top: 0; }
    .post-list h3 a { text-decoration: none; color: #1a1a2e; }
    .post-list h3 a:hover { color: #2563eb; }
    .post-list .excerpt { color: #555; margin: 0; }

    .tag {
      display: inline-block;
      background: #eef;
      color: #2563eb;
      padding: 0.1em 0.5em;
      border-radius: 3px;
      font-size: 0.8rem;
      margin-right: 0.3rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #999;
      font-size: 0.85rem;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
    <nav>
      <a href="{{ '/' | relative_url }}">Posts</a>
      <a href="https://github.com/xorbh/agentic-programming">GitHub</a>
    </nav>
  </header>

  <div class="container">
    {{ content }}
  </div>

  <footer>
    {{ site.title }} &copy; {{ site.time | date: '%Y' }}
  </footer>
</body>
</html>
