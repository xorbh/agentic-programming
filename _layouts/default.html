<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="icon" type="image/png" sizes="96x96" href="{{ '/assets/favicon-96.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="48x48" href="{{ '/assets/favicon-48.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ '/assets/favicon-192.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 18px;
      line-height: 1.7;
      color: #1a1a2e;
      background: #fafafa;
    }

    header {
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header a { color: #e0e0e0; text-decoration: none; }
    header .site-title { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.5rem; }
    header .site-logo { height: 28px; width: 28px; }
    header .site-title:hover { color: #fff; }
    header nav a { margin-left: 1.5rem; font-size: 0.95rem; }
    header nav a:hover { color: #fff; }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    @media (min-width: 1200px) {
      .container { max-width: 1100px; }
    }

    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #1a1a2e; letter-spacing: -0.02em; }
    h2 { font-size: 1.5rem; margin-top: 2rem; margin-bottom: 0.75rem; color: #1a1a2e; }
    h3 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }

    p { margin-bottom: 1rem; }
    a { color: #2563eb; }

    ul, ol { margin-bottom: 1rem; padding-left: 1.5rem; }
    li { margin-bottom: 0.3rem; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
    }
    th, td {
      text-align: left;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #e0e0e0;
    }
    th { background: #f0f0f5; font-weight: 600; }

    pre {
      padding: 1.2rem 1.5rem;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    /* Rouge wraps highlighted code in div.highlight > pre.highlight */
    div.highlight {
      margin-bottom: 1.5rem;
    }
    div.highlight pre {
      margin-bottom: 0;
    }

    /* Fallback for non-highlighted pre blocks */
    pre:not(.highlight) {
      background: #272822;
      color: #f8f8f2;
    }

    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.88em;
    }

    p code, li code, td code {
      background: #eef;
      padding: 0.15em 0.4em;
      border-radius: 3px;
    }

    /* Rouge syntax highlighting — Monokai */
    .highlight table td { padding: 5px; }
    .highlight table pre { margin: 0; }
    .highlight { color: #f8f8f2; background-color: #272822; border-radius: 6px; }
    .highlight .c, .highlight .ch, .highlight .cd, .highlight .cpf,
    .highlight .cm, .highlight .c1 { color: #75715e; font-style: italic; }
    .highlight .cp { color: #75715e; font-weight: bold; }
    .highlight .cs { color: #75715e; font-weight: bold; font-style: italic; }
    .highlight .err { color: #f8f8f2; }
    .highlight .gi { color: #ffffff; background-color: #324932; }
    .highlight .gd { color: #ffffff; background-color: #493131; }
    .highlight .ge { font-style: italic; }
    .highlight .k, .highlight .kv, .highlight .kc, .highlight .kd,
    .highlight .kp, .highlight .kr, .highlight .kt { color: #66d9ef; font-weight: bold; }
    .highlight .kn, .highlight .ow, .highlight .o { color: #f92672; font-weight: bold; }
    .highlight .mf, .highlight .mh, .highlight .il, .highlight .mi,
    .highlight .mo, .highlight .m, .highlight .mb, .highlight .mx,
    .highlight .se { color: #ae81ff; }
    .highlight .sa { color: #66d9ef; font-weight: bold; }
    .highlight .sb, .highlight .sc, .highlight .sd, .highlight .s2,
    .highlight .sh, .highlight .si, .highlight .sx, .highlight .sr,
    .highlight .s1, .highlight .ss, .highlight .s, .highlight .dl { color: #e6db74; }
    .highlight .na { color: #a6e22e; }
    .highlight .nc, .highlight .nd, .highlight .ne,
    .highlight .nf, .highlight .fm { color: #a6e22e; font-weight: bold; }
    .highlight .no { color: #66d9ef; }
    .highlight .bp, .highlight .nb, .highlight .ni, .highlight .nn,
    .highlight .vc, .highlight .vg, .highlight .vi, .highlight .nv,
    .highlight .vm, .highlight .w, .highlight .p { color: #f8f8f2; }
    .highlight .nl { color: #f8f8f2; font-weight: bold; }
    .highlight .nt { color: #f92672; }

    blockquote {
      border-left: 3px solid #2563eb;
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      color: #444;
      background: #f5f5ff;
    }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 2rem 0;
    }

    .post-meta {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .post-list { list-style: none; padding: 0; }
    .post-list li {
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #eee;
    }
    .post-list li:last-child { border-bottom: none; }
    .post-list h3 { margin-top: 0; }
    .post-list h3 a { text-decoration: none; color: #1a1a2e; }
    .post-list h3 a:hover { color: #2563eb; }
    .post-list .excerpt { color: #555; margin: 0; }

    .tag {
      display: inline-block;
      background: #eef;
      color: #2563eb;
      padding: 0.1em 0.5em;
      border-radius: 3px;
      font-size: 0.8rem;
      margin-right: 0.3rem;
    }

    /* TL;DR box */
    .tldr {
      background: linear-gradient(135deg, #f0f4ff, #e8eeff);
      border-left: 4px solid #2563eb;
      padding: 1.2rem 1.5rem;
      margin-bottom: 2.5rem;
      border-radius: 0 6px 6px 0;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #333;
    }
    .tldr strong {
      color: #2563eb;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Lead paragraph */
    .lead {
      font-size: 1.15rem;
      color: #444;
      line-height: 1.8;
      margin-bottom: 1.2rem;
    }

    /* Callout box */
    .callout {
      background: #fffbeb;
      border: 1px solid #f0d060;
      border-radius: 6px;
      padding: 1.2rem 1.5rem;
      margin: 2rem 0;
      font-size: 1rem;
      line-height: 1.6;
    }
    .callout strong {
      color: #92600a;
    }

    /* Comparison grid */
    .comparison-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: 2rem 0;
    }
    @media (max-width: 600px) {
      .comparison-grid { grid-template-columns: 1fr; }
    }
    .comparison-card {
      padding: 1.2rem 1.5rem;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
    }
    .comparison-card h4 {
      margin: 0 0 0.5rem 0;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .comparison-card p {
      margin: 0;
      font-size: 0.95rem;
      color: #555;
    }
    .comparison-pro {
      background: #f0faf0;
      border-color: #b6e2b6;
    }
    .comparison-pro h4 { color: #1a7a1a; }
    .comparison-con {
      background: #fef5f5;
      border-color: #e2b6b6;
    }
    .comparison-con h4 { color: #9a2a2a; }

    /* Section spacing for posts */
    h2 {
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid #eee;
    }
    h2:first-of-type {
      margin-top: 1.5rem;
      padding-top: 0;
      border-top: none;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #999;
      font-size: 0.85rem;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <header>
    <a href="{{ '/' | relative_url }}" class="site-title"><img src="{{ '/assets/logo.png' | relative_url }}" alt="" class="site-logo">{{ site.title }}</a>
    <nav>
      <a href="{{ '/' | relative_url }}">Posts</a>
      <a href="https://github.com/xorbh/agentic-programming">GitHub</a>
    </nav>
  </header>

  <div class="container">
    {{ content }}
  </div>

  <footer>
    {{ site.title }} &copy; {{ site.time | date: '%Y' }}
  </footer>
</body>
</html>
